<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spymo - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <!-- Logo Header -->
        <div class="logo-box">
            <h1 class="app-logo">Spymo</h1>
            <p class="tagline">Welcome back, log in to continue</p>
        </div>

        <!-- Login Form (No Password) -->
        <form id="login-form">
            <div class="input-group">
                <i class="fa-regular fa-user input-icon"></i>
                <input type="text" id="login-username" placeholder="Username" required autocomplete="off">
            </div>

            <div class="input-group">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="login-email" placeholder="Email address" required autocomplete="off">
            </div>

            <button type="submit" id="login-btn">Log In</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <!-- Signup Navigation -->
        <div class="footer-box">
            <p>Don't have an account? <a href="index.html">Sign Up</a></p>
        </div>
    </div>
<script>
    // ബ്രൗസർ Service Worker സപ്പോർട്ട് ചെയ്യുന്നുണ്ടോ എന്ന് പരിശോധിക്കുന്നു
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('Service Worker Registered successfully:', registration.scope);
                })
                .catch((error) => {
                    console.log('Service Worker Registration failed:', error);
                });
        });
    }
</script>

    <!-- Firebase Connections & Logic Script -->
    <script type="module" src="login.js"></script>
</body>
</html>
