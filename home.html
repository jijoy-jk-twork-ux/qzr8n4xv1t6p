<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinitySpot</title>
    <link rel="stylesheet" href="style.css">
    <!-- Icons ലഭിക്കാൻ വേണ്ടിയുള്ള FontAwesome ലിങ്ക് -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Top App Bar -->
    <header class="top-bar">
        <div class="logo">Spymo</div>
        <div class="top-icons">
            <a href="announcement.html" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-bell" id="announcement-bell"></i>
            <i class="fa-regular fa-heart"></i>
            <a href="numusers.html" style="color: inherit; text-decoration: none;"><i class="fa-regular fa-paper-plane"></i></a>
        </div>
    </header>

    <!-- Main Content (Feed) -->
    <!-- ഫയർബേസിൽ നിന്നുള്ള പോസ്റ്റുകൾ ഓട്ടോമാറ്റിക് ആയി ഇതിന്റെ ഉള്ളിലേക്കാണ് വരിക -->
    <main class="feed-container">
        <!-- 🟦 Square Stories Section -->
<div class="stories-wrapper" id="stories-container">
    <!-- യൂസറുടെ സ്വന്തം സ്റ്റോറി ആഡ് ചെയ്യാനുള്ള ബട്ടൺ (Your Story) -->
    <div class="story-square-card my-story-card" onclick="window.location.href='create-story.html'">
        <i class="fa-solid fa-plus add-icon"></i>
        <span class="story-username-tag my-story-tag">Your Story</span>
    </div>
    
    <!-- ബാക്കി യൂസർമാരുടെ സ്റ്റോറികൾ JS വഴി ഓട്ടോമാറ്റിക് ആയി ഇതിലേക്ക് ലോഡ് ആകും -->
</div>

        
        <!-- ഡാറ്റാബേസ് കണക്ട് ആകുന്നതുവരെ കാണിക്കാൻ ഒരു ചെറിയ ലോഡിംഗ് മെസ്സേജ് -->
        <p style="text-align:center; padding:20px; color:#888;">Loading posts...</p>

    </main>
    
    <!-- Upload Post Modal (Popup Window) -->
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New posts</h3>
                <span class="close-btn" id="close-modal">&times;</span>
            </div>
            
            <div class="modal-body">
                <!-- ഫയൽ സെലക്ട് ചെയ്യാനുള്ള ഏരിയ -->
                <div class="file-drop-area" id="drop-area">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Select photo</p>
                    <input type="file" id="file-input" accept="image/*,video/*" hidden>
                    <button class="select-btn" onclick="document.getElementById('file-input').click()">Browse file</button>
                </div>
                
                <!-- സെലക്ട് ചെയ്ത മീഡിയ കാണാനുള്ള ഭാഗം -->
                <div id="preview-container" class="hidden">
                    <img id="image-preview" src="" alt="Preview" class="hidden">
                    <video id="video-preview" controls class="hidden"></video>
                    <button id="remove-file-btn" class="remove-btn">Replace</button>
                </div>

                <!-- ക്യാപ്ഷൻ എഴുതാനുള്ള ബോക്സ് -->
                <textarea id="caption-input" placeholder="ക്യാപ്ഷൻ ഇവിടെ എഴുതാം..."></textarea>
                
                <button id="submit-post-btn" class="upload-submit-btn">Post</button>
            </div>
        </div>
    </div>

    <!-- 💬 Comment Bottom Sheet (ഇതാണ് പുതിയതായി ചേർത്ത കമന്റ് ബോക്സ്) -->
    <div id="comment-sheet" class="comment-sheet">
        <div class="sheet-overlay"></div>
        <div class="sheet-content">
            <div class="sheet-header">
                <div class="drag-handle"></div>
                <h3>Comments</h3>
                <button id="close-comments" class="close-btn">&times;</button>
            </div>
            
            <!-- കമന്റുകൾ ലോഡ് ആയി വരാൻ പോകുന്ന കണ്ടെയ്നർ -->
            <div id="comments-container" class="comments-container">
                <p class="no-comments">No comments yet. Start the conversation!</p>
            </div>

            <!-- കമന്റ് ടൈപ്പ് ചെയ്ത് അയക്കാനുള്ള ഇൻപുട്ട് ഏരിയ -->
            <div class="comment-input-area">
                <input type="text" id="comment-input" placeholder="Add a comment...">
                <button id="submit-comment-btn">Post</button>
            </div>
        </div>
    </div>


    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <i class="fa-solid fa-house active"></i>
        <a href="search.html"><i class="fa-solid fa-magnifying-glass"></i></a>
        <i class="fa-regular fa-square-plus" id="upload-btn"></i>
        <a href="explore.html" style="color: inherit; text-decoration: none;"><i class="fa-solid fa-clapperboard"></i></a>
        <a href="profile.html" style="color: inherit; text-decoration: none;">
    <i class="fa-regular fa-user"></i>
</a>

    </nav>
    <script>
    // ബ്രൗസർ Service Worker സപ്പോർട്ട് ചെയ്യുന്നുണ്ടോ എന്ന് പരിശോധിക്കുന്നു
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('Service Worker Registered successfully:', registration.scope);
                })
                .catch((error) => {
                    console.log('Service Worker Registration failed:', error);
                });
        });
    }
</script>

    <!-- ജാവാസ്ക്രിപ്റ്റ് ഫയൽ കണക്ട് ചെയ്യുന്നു (Module ടൈപ്പിൽ തന്നെ) -->
    <script type="module" src="app.js"></script>
    <script type="module" src="internal.js"></script>
    <script src="spy.js"></script>
</body>
</html>
