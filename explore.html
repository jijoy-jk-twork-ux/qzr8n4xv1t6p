<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore</title>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    
    <style>
        /*--- Core Theme & Reset ---*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(229, 9, 20, 0.12) 0%, transparent 45%), 
                radial-gradient(circle at 85% 75%, rgba(0, 102, 255, 0.12) 0%, transparent 45%);
            color: #e5e5e5;
            padding: 20px 15px 90px 15px;
            overflow-x: hidden;
        }

        /*--- Instagram Style Grey Header ---*/
        .creator-title {
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #555555;
            text-transform: lowercase;
            margin: 10px 0 20px 0;
            opacity: 0.6;
        }

        /*--- Explore Containers (Insta Settings Style) ---*/
        .explore-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0 30px 0;
        }

        .explore-box {
            background-color: rgba(26, 26, 26, 0.6);
            border: 1px solid #222;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .explore-text {
            font-size: 15px;
            font-weight: 500;
            color: #e5e5e5;
        }

        .arrow-icon {
            color: #555;
            font-size: 14px;
        }

        .section-divider {
            border: 0;
            height: 1px;
            background: #1a1a1a;
            margin: 30px 0;
        }

        /*--- Report Form Style ---*/
        .report-container {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
        }

        .report-container h3 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 5px;
        }

        .report-container p {
            font-size: 12px;
            color: #757575;
            margin-bottom: 15px;
        }

        #reportForm {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #reportForm input, #reportForm textarea {
            width: 100%;
            background: #141414;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        #reportForm input:focus, #reportForm textarea:focus {
            border-color: #e50914;
        }

        #submitBtn {
            background-color: #e50914;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        #submitBtn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- ഹെഡ്ഡർ ടാഗ് -->
    <h2 class="creator-title">Explore</h2>

    <!-- ഫീച്ചേഴ്സ് സെക്ഷൻ -->
    <div class="explore-container">
        <div class="explore-box" onclick="location.href='movie.html';">
            <span class="explore-text">Creators creativity</span>
            <span class="arrow-icon">➔</span>
        </div>
        
        <div class="explore-box" onclick="location.href='game.html';">
            <span class="explore-text">Snake game</span>
            <span class="arrow-icon">➔</span>
        </div>

        <div class="explore-box" onclick="location.href='tnx.html';">
            <span class="explore-text">infinityspot</span>
            <span class="arrow-icon">➔</span>
        </div>
    </div>

    <hr class="section-divider">

    <!-- പ്രോബ്ലം റിപ്പോർട്ട് ചെയ്യുന്ന ഏരിയ -->
    <div class="report-container">
        <h3>Report a Problem</h3>
        <p>Please let us know if you have any issues, and we will resolve them within 24 hours</p>
        
        <form id="reportForm">
            <input type="text" id="username" placeholder="Your Name / Username" required>
            <input type="email" id="email" placeholder="Your Email Address" required>
            <textarea id="problem" rows="4" placeholder="Describe your problem here..." required></textarea>
            <button type="submit" id="submitBtn">Submit Issue</button>
        </form>
        <div id="formStatus" class="status-msg"></div>
    </div>

    <!-- നിങ്ങടെ ഗൂഗിൾ ആപ്പ് സ്ക്രിപ്റ്റ് കണക്ട് ചെയ്ത ജാവാസ്ക്രിപ്റ്റ് -->
    <script>
document.getElementById('reportForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('formStatus');
    
    submitBtn.disabled = true;
    submitBtn.innerText = "Sending...";
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const problem = document.getElementById('problem').value;
    
    // നിങ്ങളുടെ ഗൂഗിൾ ആപ്പ് സ്ക്രിപ്റ്റ് വെബ് ആപ്പ് URL ഇവിടെ നൽകുക
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzFgihF_1-_tknI04jzKAySeJxD3tbtVOorlreveAPqGVXCyBbaaj7Lsz9p1JFLLcCX/exec";
    
    // കോഡ് ഡോട്ട് ജിഎസ്സിലേക്ക് അയക്കാനുള്ള ഡാറ്റ ഒബ്ജക്റ്റ്
    const payload = {
        username: username,
        email: email,
        problem: problem
    };
    
    fetch(scriptUrl, {
        method: 'POST',
        mode: 'no-cors', // CORS ബ്ലോക്ക് ഒഴിവാക്കാൻ
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    })
    .then(() => {
        // no-cors ആയതുകൊണ്ട് നേരെ ഇവിടെ എത്തും
        statusMsg.style.color = "#4caf50";
        statusMsg.innerText = "Issue registered successfully!";
        document.getElementById('reportForm').reset();
    })
    .catch(error => {
        statusMsg.style.color = "#e50914";
        statusMsg.innerText = "Something went wrong. Please try again.";
        console.error(error);
    })
    .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Issue";
    });
});
</script>
</body>
</html>
