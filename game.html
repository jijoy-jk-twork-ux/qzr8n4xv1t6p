<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spymo Tic-Tac-Toe</title>
    <style>
        body { 
            font-family: 'Poppins', Arial, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: white; 
            margin: 0;
            padding: 20px;
            overflow: hidden; /* എമോജി സ്ക്രീനിന് പുറത്തുപോകുമ്പോൾ സ്ക്രോൾ വരാതിരിക്കാൻ */
        }

        /* 👑 Top Player Red Card */
        .top-player-card { 
            background: linear-gradient(135deg, #d32f2f, #8b0000); 
            color: #ffffff; 
            padding: 15px; 
            font-weight: bold; 
            font-size: 1.2rem;
            margin-bottom: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
            border: 1px solid #ff5252;
        }

        h2 { color: #ff5252; margin-bottom: 5px; }
        #status { font-size: 1rem; color: #ccc; margin-bottom: 15px; }

        /* 🎮 Red Game Board */
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 90px); 
            gap: 10px; 
            justify-content: center; 
            margin: 20px auto; 
        }

        .cell { 
            width: 90px; 
            height: 90px; 
            background: #1e1e1e; 
            font-size: 2.5rem; 
            font-weight: bold;
            color: #ff5252;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border-radius: 10px; 
            border: 2px solid #ff1744;
            box-shadow: inset 0 0 10px rgba(255, 23, 68, 0.2);
            transition: all 0.2s ease-in-out;
        }

        .cell.disabled { pointer-events: none; opacity: 0.8; }

        /* 🔴 Red Matchmaking Button */
        .red-btn { 
            padding: 12px 25px; 
            font-size: 16px; 
            font-weight: bold;
            background: #ff1744; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(255, 23, 68, 0.5);
        }

        /* 😀 Live Emoji Container */
        .emoji-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .emoji-btn {
            font-size: 2rem;
            background: #1e1e1e;
            border: 1px solid #ff1744;
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }

        .emoji-btn:active { transform: scale(1.3); }

        /* 🚀 Floating Emoji Animation */
        .floating-emoji {
            position: absolute;
            bottom: 50px;
            font-size: 3rem;
            animation: floatUp 2s ease-in-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 1;
            }
            50% {
                transform: translateY(-250px) scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-500px) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 👑 Top Player Red Banner -->
    <div class="top-player-card" id="top-player-banner">
        👑 Top Player: Loading...
    </div>

    <h2>Tic-Tac-Toe Arena</h2>
    <p id="status">Click 'Find Match' to start!</p>

    <button class="red-btn" id="find-btn">Find Match</button>

    <!-- 🎮 Tic Tac Toe Grid -->
    <div class="board" id="board" style="display: none;">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <!-- 😀 Live Emojis Bar -->
    <div class="emoji-bar" id="emoji-bar" style="display: none;">
        <span class="emoji-btn" onclick="sendEmoji('🔥')">🔥</span>
        <span class="emoji-btn" onclick="sendEmoji('😂')">😂</span>
        <span class="emoji-btn" onclick="sendEmoji('👍')">👍</span>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
