<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spymo Tic-Tac-Toe</title>
    <style>
        body { 
            font-family: 'Poppins', Arial, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: white; 
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        .top-player-card { 
            background: linear-gradient(135deg, #d32f2f, #8b0000); 
            color: #ffffff; 
            padding: 12px; 
            font-weight: bold; 
            font-size: 1.1rem;
            margin-bottom: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
            border: 1px solid #ff5252;
        }

        h2 { color: #ff5252; margin: 5px 0; }
        #status { font-size: 0.95rem; color: #ccc; margin-bottom: 10px; }
        #timer { font-weight: bold; color: #ff5252; }

        /* 🎮 Game Board & Winning Line */
        .board-container {
            position: relative;
            display: inline-block;
            margin: 10px auto;
        }

        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 85px); 
            gap: 8px; 
            justify-content: center; 
        }

        .cell { 
            width: 85px; 
            height: 85px; 
            background: #1e1e1e; 
            font-size: 2.2rem; 
            font-weight: bold;
            color: #ff5252;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border-radius: 10px; 
            border: 2px solid #ff1744;
            box-shadow: inset 0 0 10px rgba(255, 23, 68, 0.2);
            transition: all 0.2s ease-in-out;
        }

        .cell.disabled { pointer-events: none; opacity: 0.8; }

        .winning-line {
            position: absolute;
            background-color: #00ff66;
            box-shadow: 0 0 12px #00ff66;
            z-index: 10;
            border-radius: 5px;
            transition: all 0.3s ease;
            display: none;
        }

        .red-btn { 
            padding: 12px 25px; 
            font-size: 16px; 
            font-weight: bold;
            background: #ff1744; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(255, 23, 68, 0.5);
        }

        /* 😀 Live Emoji Bar */
        .emoji-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .emoji-btn {
            font-size: 1.8rem;
            background: #1e1e1e;
            border: 1px solid #ff1744;
            padding: 6px 12px;
            border-radius: 50px;
            cursor: pointer;
        }

        .floating-emoji {
            position: absolute;
            bottom: 50px;
            font-size: 3rem;
            animation: floatUp 2s ease-in-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            50% { transform: translateY(-250px) scale(1.2); opacity: 0.8; }
            100% { transform: translateY(-500px) scale(1); opacity: 0; }
        }

        /* 💬 Temporary Chat Box */
        .chat-container {
            max-width: 320px;
            margin: 15px auto 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            text-align: left;
        }

        .chat-box {
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-msg {
            background: #262626;
            padding: 4px 8px;
            border-radius: 6px;
            word-break: break-word;
        }

        .chat-input-group {
            display: flex;
            gap: 5px;
        }

        .chat-input-group input {
            flex: 1;
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            padding: 6px;
            border-radius: 5px;
            outline: none;
        }

        .chat-input-group button {
            background: #ff1744;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 👑 Leaderboard Banner -->
    <div class="top-player-card" id="top-player-banner">
        👑 Top Player: Loading...
    </div>

    <h2>Tic-Tac-Toe Arena</h2>
    <p id="status">Click 'Find Match' to start!</p>

    <button class="red-btn" id="find-btn">Find Match</button>

    <!-- 🎮 Grid + Line -->
    <div class="board-container">
        <div class="winning-line" id="winning-line"></div>
        <div class="board" id="board" style="display: none;">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
    </div>

    <!-- 😀 Live Emojis Bar -->
    <div class="emoji-bar" id="emoji-bar" style="display: none;">
        <span class="emoji-btn" onclick="sendEmoji('🔥')">🔥</span>
        <span class="emoji-btn" onclick="sendEmoji('😂')">😂</span>
        <span class="emoji-btn" onclick="sendEmoji('👍')">👍</span>
    </div>

    <!-- 💬 Live Chat Container -->
    <div class="chat-container" id="chat-container" style="display: none;">
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input-group">
            <input type="text" id="chat-input" placeholder="Type a message..." maxlength="50">
            <button id="send-chat-btn">Send</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
