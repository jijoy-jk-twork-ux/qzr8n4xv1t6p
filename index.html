<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Spot - Sign Up</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <!-- ലോഗോ/ഹെഡിങ് സെക്ഷൻ -->
        <div class="brand-header">
            <h1 class="brand-logo">Spymo</h1>
            <p class="brand-tagline">Explore.Connect.Create.Your visual world</p>
        </div>

        <!-- ഫോം സെക്ഷൻ -->
        <form class="auth-form" onsubmit="return false;">
            
            <!-- Full Name -->
            <div class="input-group">
                <label for="fullNameInput"><i class="fa-regular fa-user"></i> Name</label>
                <input type="text" id="fullNameInput" placeholder="മുഴുവൻ പേര് ടൈപ്പ് ചെയ്യുക" required autocomplete="off">
            </div>

            <!-- Username -->
            <div class="input-group">
                <label for="usernameInput"><i class="fa-solid fa-at"></i> username</label>
                <input type="text" id="usernameInput" placeholder="username" required autocomplete="off">
                <small id="usernameStatus" class="status-msg">Enter your username..</small>
            </div>

            <!-- Email -->
            <div class="input-group">
                <label for="emailInput"><i class="fa-regular fa-envelope"></i> email</label>
                <input type="email" id="emailInput" placeholder="example@gmail.com" required autocomplete="off">
            </div>

            <!-- Password -->
            <div class="input-group">
                <label for="passwordInput"><i class="fa-solid fa-key"></i> password</label>
                <input type="password" id="passwordInput" placeholder="At least 6 characters" required>
            </div>

            <!-- Submit Button (തുടക്കത്തിൽ ഡിസേബിൾഡ് ആയിരിക്കും) -->
            <button type="submit" id="signUpBtn" disabled class="submit-btn">
                <span>Start</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>

        </form>

        <!-- താഴെയുള്ള ലിങ്ക് -->
        <div class="auth-footer">
            <p>Already have an account?<a href="login.html" class="login-link">Log in</a></p>
        </div>
    </div>

    <!-- നീ തന്ന auth.js ഇവിടെ ലിങ്ക് ചെയ്യുക (type="module" ആയിരിക്കണം) -->
    <script type="module" src="auth.js"></script>
</body>
</html>
