<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Join Us</title>
    <!-- CSS ഫയലിന്റെ പേര് auth.css എന്ന് തന്നെ ഇവിടെ നൽകിയിട്ടുണ്ട് -->
    <link rel="stylesheet" href="auth.css"> 
    <style>
        /* ലോക്കൽ സ്റ്റോറേജ് ചെക്ക് ചെയ്യുന്നത് വരെ സ്ക്രീൻ ബഗ്ഗ് അടിക്കാതിരിക്കാൻ ബോഡി തൽക്കാലം മറയ്ക്കുന്നു */
        body { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Welcome to InfinitySpot</h2>
        <p>Please enter your details to get started</p>
        
        <!-- ഇമെയിൽ, പാസ്‌വേഡ് ഇൻപുട്ടുകൾ ഇവിടെ ചേർത്തു -->
        <input type="email" id="emailInput" placeholder="Email" required>
        <input type="password" id="passwordInput" placeholder="Password (minimum 6 characters)" required>
        
        <input type="text" id="usernameInput" placeholder="A unique username (e.g.: jj_empire)" required>
        <p id="usernameStatus" style="font-size: 12px; margin-top: -5px; display: none;"></p>
        
        <input type="text" id="fullNameInput" placeholder="Full name" required>
        
        <button id="signUpBtn" disabled>Start</button>
    </div>

    <!-- ഫയർബേസ് കണക്ഷൻ ലൈബ്രറികൾ (ഒരു തവണ മാത്രം) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- നിന്റെ ജാവാസ്ക്രിപ്റ്റ് ഫയൽ -->
    <script src="auth.js"></script>

</body>
</html>
