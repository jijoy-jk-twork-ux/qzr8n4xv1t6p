<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinitySpot - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 🎯 പ്രൊഫൈൽ ഹെഡർ */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        /* 📸 പ്രൊഫൈൽ ഇമേജ് കണ്ടെയ്നർ */
        .profile-img-container {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff1e42;
            background-color: #1a1a1a;
            display: block;
        }

        /* 🔴 ക്യാമറ ബട്ടൺ (പ്രൊഫൈൽ ചിത്രത്തിന് താഴെ വരാൻ) */
        .edit-pic-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background-color: #ff1e42;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #0d0d0d;
            font-size: 12px;
            z-index: 5;
            transition: transform 0.2s;
        }
        
        .edit-pic-btn:hover {
            transform: scale(1.1);
        }

        .profile-info {
            flex-grow: 1;
        }
        
        .profile-info h2 {
            margin: 0;
            font-size: 22px;
            font-weight: bold;
        }

        .profile-info .username-handle {
            margin: 3px 0 8px 0;
            color: #888;
            font-size: 14px;
        }

        .profile-info .bio-text {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #ddd;
            line-height: 1.4;
        }

        /* പോസ്റ്റ് ഗ്രിഡ് */
        .my-posts-title {
            margin: 20px 0 15px 0;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff1e42;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding-bottom: 50px;
        }

        .grid-item {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid #222;
        }

        .grid-item img, .grid-item video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <button class="nav-btn" onclick="window.location.href='home.html'"><i class="fa-solid fa-arrow-left"></i></button>

        <div class="profile-header">
            <div class="profile-img-container">
                <img id="user-profile-pic" src="" alt="User Avatar" class="profile-img">
                
                <label for="profile-pic-input" class="edit-pic-btn" id="edit-pic-label" style="display: none;">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
            </div>

            <div class="profile-info">
                <h2 id="user-display-name">Loading...</h2>
                <p id="user-handle" class="username-handle">@username</p>
                <p id="user-bio" class="bio-text">Exploring the digital space! 🚀</p>
            </div>
        </div>

        <div class="my-posts-title">POSTS</div>
        <div class="posts-grid" id="my-posts-grid"></div>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
