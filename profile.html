<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinitySpot - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 🎯 പ്രൊഫൈൽ ഹെഡർ */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        /* 📸 പ്രൊഫൈൽ ഇമേജ് കണ്ടെയ്നർ */
        .profile-img-container {
            position: relative;
            width: 90px;
            height: 90px;
            flex-shrink: 0;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff1e42;
            background-color: #1a1a1a;
            display: block;
        }

        /* 🔴 ക്യാമറ ബട്ടൺ */
        .edit-pic-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background-color: #ff1e42;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #0d0d0d;
            font-size: 12px;
            z-index: 5;
            transition: transform 0.2s;
        }
        
        .edit-pic-btn:hover {
            transform: scale(1.1);
        }

        .profile-info {
            flex-grow: 1;
        }
        
        .profile-info h2 {
            margin: 0;
            font-size: 22px;
            font-weight: bold;
        }

        .profile-info .username-handle {
            margin: 3px 0 8px 0;
            color: #888;
            font-size: 14px;
        }

        .profile-info .bio-text {
            margin: 5px 0 12px 0;
            font-size: 14px;
            color: #ddd;
            line-height: 1.4;
        }

        /* 📊 Followers / Following Counter Section */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .stat-item {
            display: flex;
            gap: 5px;
            font-size: 14px;
        }

        .stat-count {
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            color: #888;
        }

        /* 🤝 Action Button (Follow / Edit) */
        .profile-action-btn {
            background-color: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-action-btn.follow-btn {
            background-color: #ff1e42;
            border-color: #ff1e42;
        }

        .profile-action-btn.following {
            background-color: transparent;
            border-color: #444;
            color: #aaa;
        }

        /* പോസ്റ്റ് ഗ്രിഡ് */
        .my-posts-title {
            margin: 20px 0 15px 0;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff1e42;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding-bottom: 50px;
        }

        .grid-item {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid #222;
        }

        .grid-item img, .grid-item video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* 🪟 EDIT PROFILE MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-box {
            background: #141414;
            border: 1px solid #282828;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-title {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .modal-textarea {
            width: 100%;
            height: 80px;
            background: #222;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: #ff1e42;
        }

        .save-btn {
            width: 100%;
            background: #ff1e42;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }
        /* 🔵 Verified Blue Tick Badge Styling */
.user-display-wrapper {
    display: flex;
    align-items: center;
    gap: 6px;
}

.verified-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: #0095f6; /* Instagram Blue */
    color: #ffffff;
    width: 15px;
    height: 15px;
    
    /* 🔹 ഇൻസ്റ്റാഗ്രാം മോഡൽ 12-പയിന്റ് സ്റ്റാർ ഡിസൈൻ */
    clip-path: polygon(
        100% 50%, 93.3% 62.94%, 93.3% 77.45%, 80.86% 84.86%, 
        70.71% 95.71%, 56.46% 93.3%, 43.54% 93.3%, 29.29% 95.71%, 
        19.14% 84.86%, 6.7% 77.45%, 6.7% 62.94%, 0% 50%, 
        6.7% 37.06%, 6.7% 22.55%, 19.14% 15.14%, 29.29% 4.29%, 
        43.54% 6.7%, 56.46% 6.7%, 70.71% 4.29%, 80.86% 15.14%, 
        93.3% 22.55%, 93.3% 37.06%
    );
    
    flex-shrink: 0;
}


    </style>
</head>
<body>

    <div class="profile-container">
        <button class="nav-btn" onclick="window.location.href='home.html'"><i class="fa-solid fa-arrow-left"></i></button>

        <div class="profile-header">
            <div class="profile-img-container">
                <img id="user-profile-pic" src="" alt="User Avatar" class="profile-img">
                
                <label for="profile-pic-input" class="edit-pic-btn" id="edit-pic-label" style="display: none;">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
            </div>

<div class="profile-info">
    <!-- 🔵 Blue Tick Badge ചേർക്കാൻ അനുയോജ്യമായ wrapper -->
    <div class="user-display-wrapper">
        <h2 id="user-display-name">Loading...</h2>
        
        <!-- ഫയർബേസിൽ Verified ആണെങ്കിൽ ഈ ഇൻസ്റ്റാഗ്രാം മോഡൽ ബ്ലൂ ടിക്ക് കാണിക്കും -->
        <span id="profile-blue-tick" class="verified-badge" style="display: none;">
            <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </span>
    </div>
</div>

    
    <p id="user-handle" class="username-handle">@username</p>
    <p id="user-bio" class="bio-text">Exploring the digital space! 🚀</p>


                <!-- Followers & Following Stats -->
                <div class="stats-container">
                    <div class="stat-item">
                        <span class="stat-count" id="followers-count">0</span>
                        <span class="stat-label">followers</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-count" id="following-count">0</span>
                        <span class="stat-label">following</span>
                    </div>
                </div>

                <!-- Follow / Edit Profile Dynamic Button -->
                <button id="profile-action-btn" class="profile-action-btn" style="display: none;">Edit Profile</button>
            </div>
        </div>

        <div class="my-posts-title">POSTS</div>
        <div class="posts-grid" id="my-posts-grid"></div>
    </div>

    <!-- 🪟 EDIT PROFILE POP-UP MODAL -->
    <div id="edit-profile-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">
                <span>Edit Bio</span>
                <button id="close-modal-btn" class="modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="input-group">
                <label for="edit-bio-input">Bio</label>
                <textarea id="edit-bio-input" class="modal-textarea" placeholder="Write something about yourself..."></textarea>
            </div>
            <button id="save-bio-btn" class="save-btn">Save Changes</button>
        </div>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
