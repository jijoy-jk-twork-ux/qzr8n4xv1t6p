<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spymo - Reels</title>
    <link rel="stylesheet" href="reels.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Main Reels Container (Full Screen) -->
    <div class="reels-container" id="reels-container">
        <!-- JS വഴി വീഡിയോസ് ഇവിടെ ഡൈനാമിക് ആയി ലോഡ് ஆகும் -->
    </div
    <!-- 💬 Comment Modal Bottom Sheet -->
<div id="comment-modal" class="comment-modal">
    <div class="comment-modal-content">
        <div class="comment-header">
            <h3>Comments</h3>
            <span id="close-comments" class="close-btn">&times;</span>
        </div>
        <div id="comments-list" class="comments-list">
            <!-- കമന്റുകൾ ഇവിടെ ഡൈനാമിക്കായി ലോഡ് ആകും -->
        </div>
        <div class="comment-input-area">
            <input type="text" id="comment-input" placeholder="Add a comment..." />
            <button id="post-comment-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>


    <script type="module" src="reels.js"></script>
</body>
</html>
